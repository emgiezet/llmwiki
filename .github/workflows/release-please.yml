name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: go
          # release-please maintains a single "Release PR" that accumulates
          # conventional-commit history (feat:, fix:, feat!:/BREAKING CHANGE:).
          # Merging that PR creates a vX.Y.Z tag + GitHub Release, which the
          # release.yml workflow consumes to upload binaries.
