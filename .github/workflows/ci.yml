name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel stale runs on the same ref when a newer commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race detector)
        run: go test -race ./...

      - name: govulncheck (soft — warn only)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
