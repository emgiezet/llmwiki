name: release-please

on:
  push:
    branches: [main]
  # Allow manual re-trigger from the Actions tab — useful when a run failed
  # due to a one-time repo setting (e.g. "Allow GitHub Actions to create
  # pull requests") that wasn't enabled yet.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go
          # release-please maintains a single "Release PR" that accumulates
          # conventional-commit history (feat:, fix:, feat!:/BREAKING CHANGE:).
          # Merging that PR creates a vX.Y.Z tag + GitHub Release; the
          # goreleaser job below runs in the same workflow to attach binaries.
          # (A tag push made by GITHUB_TOKEN does NOT trigger other workflows,
          # so the standalone release.yml never fires for release-please tags —
          # we chain here instead.)

  goreleaser:
    name: Build and publish release binaries
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go vet ./...
      - run: go test -race ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
