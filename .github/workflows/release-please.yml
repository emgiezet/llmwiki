name: release-please

on:
  push:
    branches: [main]
  # Allow manual re-trigger from the Actions tab — useful when a run failed
  # due to a one-time repo setting (e.g. "Allow GitHub Actions to create
  # pull requests") that wasn't enabled yet.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: go
          # release-please maintains a single "Release PR" that accumulates
          # conventional-commit history (feat:, fix:, feat!:/BREAKING CHANGE:).
          # Merging that PR creates a vX.Y.Z tag + GitHub Release, which the
          # release.yml workflow consumes to upload binaries.
